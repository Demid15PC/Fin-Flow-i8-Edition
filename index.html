<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>i8 Financial Cockpit 🏎️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            color-scheme: dark;
            --protonic-blue: #00f0ff;
            --bmw-blue: #0066b2;
            --sport-red: #ff3b30;
            --eco-green: #34c759;
            --carbon-black: #0a0e17;
        }

        body {
            background-color: var(--carbon-black);
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 75%),
                linear-gradient(45deg, #070a10 25%, transparent 25%),
                linear-gradient(-45deg, #070a10 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #070a10 75%),
                linear-gradient(-45deg, transparent 75%, #070a10 75%);
            background-size: 100% 100%, 16px 16px, 16px 16px, 16px 16px, 16px 16px;
            background-position: center top, 0 0, 0 8px, 8px -8px, -8px 0px;
        }

        .font-tech {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Ambient Lighting and Dashboard Glass Effects */
        .i8-panel {
            background: rgba(13, 20, 35, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Protonic Blue Comfort Glow */
        .theme-comfort .i8-glow {
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
            border-color: rgba(0, 240, 255, 0.3);
        }
        .theme-comfort .text-glow {
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        /* Sport Mode Glow */
        .theme-sport .i8-glow {
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.3);
            border-color: rgba(255, 59, 48, 0.4);
        }
        .theme-sport .text-glow {
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.8);
            color: var(--sport-red) !important;
        }

        /* Eco Pro Mode Glow */
        .theme-ecopro .i8-glow {
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.25);
            border-color: rgba(52, 199, 89, 0.3);
        }
        .theme-ecopro .text-glow {
            text-shadow: 0 0 8px rgba(52, 199, 89, 0.6);
            color: var(--eco-green) !important;
        }

        /* Dial Speedometer Arc Animations */
        .speedometer-svg {
            transform: rotate(-220deg);
            transform-origin: center;
        }

        /* Scrollbar customizing */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }

        /* Metallic Carbon Shimmer */
        .carbon-btn {
            background: linear-gradient(135deg, #162235 0%, #0d1424 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .carbon-btn:active {
            transform: scale(0.95);
        }

        /* Seamless Input Fields */
        .i8-input {
            background: rgba(10, 15, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.25s ease;
        }
        .i8-input:focus {
            border-color: var(--protonic-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            outline: none;
        }

        /* Drive mode transitions */
        .drive-mode-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="text-slate-200 antialiased pb-28 selection:bg-cyan-500 selection:text-white theme-comfort">

<script>
/**
 * STREAMING_CHUNK: Core Engine Initialization & Utilities
 */

// Custom Sound Synthesizer via Web Audio API (to represent high-tech BMW i8 ignition & indicators)
const SoundEngine = {
    audioCtx: null,
    isPlaying: false,
    engineNode: null,
    
    init() {
        if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },
    
    playClick() {
        if (!this.isPlaying) return;
        this.init();
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        
        osc.frequency.setValueAtTime(800, this.audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(120, this.audioCtx.currentTime + 0.08);
        
        gain.gain.setValueAtTime(0.08, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.08);
        
        osc.start();
        osc.stop(this.audioCtx.currentTime + 0.08);
    },
    
    playBeep(success = true) {
        if (!this.isPlaying) return;
        this.init();
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        
        const now = this.audioCtx.currentTime;
        if (success) {
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.06, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start();
            osc.stop(now + 0.3);
        } else {
            osc.frequency.setValueAtTime(150, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start();
            osc.stop(now + 0.4);
        }
    },

    toggleStart() {
        this.init();
        if (!this.isPlaying) {
            // Spin up synth sound (BMW i8 hybrid startup effect)
            this.isPlaying = true;
            this.playStartupSound();
            $('engine-status').innerText = "ENGINE RUNNING";
            $('engine-status').className = "text-[9px] uppercase tracking-widest font-tech font-bold text-cyan-400";
            $('engine-start-btn').className = "absolute -right-1 -bottom-1 w-4 h-4 rounded-full bg-cyan-500 border border-black flex items-center justify-center cursor-pointer shadow-md transition-all duration-300";
            
            // Visual pulse update to App logo
            $('app-logo-text').classList.add('text-glow');
        } else {
            // Shut down
            this.isPlaying = false;
            $('engine-status').innerText = "SYSTEM OFF";
            $('engine-status').className = "text-[9px] uppercase tracking-widest font-tech font-bold text-rose-500 animate-pulse";
            $('engine-start-btn').className = "absolute -right-1 -bottom-1 w-4 h-4 rounded-full bg-rose-600 border border-black flex items-center justify-center cursor-pointer shadow-md transition-all duration-300";
            $('app-logo-text').classList.remove('text-glow');
        }
    },

    playStartupSound() {
        const now = this.audioCtx.currentTime;
        
        // 1. Electric Motor Whine
        const osc1 = this.audioCtx.createOscillator();
        const gain1 = this.audioCtx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(100, now);
        osc1.frequency.exponentialRampToValueAtTime(2200, now + 1.2);
        gain1.gain.setValueAtTime(0.001, now);
        gain1.gain.linearRampToValueAtTime(0.08, now + 0.4);
        gain1.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
        
        osc1.connect(gain1);
        gain1.connect(this.audioCtx.destination);
        osc1.start(now);
        osc1.stop(now + 1.5);
        
        // 2. Low engine growl feedback
        const osc2 = this.audioCtx.createOscillator();
        const gain2 = this.audioCtx.createGain();
        osc2.type = 'sawtooth';
        osc2.frequency.setValueAtTime(45, now + 0.8);
        osc2.frequency.linearRampToValueAtTime(90, now + 1.4);
        gain2.gain.setValueAtTime(0.001, now + 0.8);
        gain2.gain.linearRampToValueAtTime(0.05, now + 1.1);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
        
        osc2.connect(gain2);
        gain2.connect(this.audioCtx.destination);
        osc2.start(now + 0.8);
        osc2.stop(now + 1.9);
    }
};

// Global Helpers
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const cur = (n) => (n||0).toLocaleString('ru-RU', {style:'currency', currency:'RUB', maximumFractionDigits:0});
const today = () => new Date().toISOString().slice(0,10);
const $ = (id) => document.getElementById(id);

// Config colors matching high tech theme
const COLOR_PALETTE = {
    cyan: '#00f0ff',
    blue: '#3b82f6',
    emerald: '#10b981',
    rose: '#f43f5e',
    amber: '#f59e0b',
    violet: '#8b5cf6',
    gray: '#64748b'
};

const COLOR_NAMES = {
    cyan: 'Гибридный Бирюзовый',
    blue: 'Protonic Синий',
    emerald: 'Экологичный Зеленый',
    rose: 'Спортивный Красный',
    amber: 'Индикаторный Оранж',
    violet: 'Лазерный Пурпур',
    gray: 'Матовый Графит'
};

// STORAGE KEY
const STORAGE_KEY = 'finflow_i8_data';

// Default State Config
const defaultState = {
    accounts: [
        {id:'main', name:'💳 Жизнь (База)', color:'blue', alloc:50, bal:0, target:0},
        {id:'invest', name:'📈 Инвест-Заряд', color:'cyan', alloc:30, bal:0, target:200000},
        {id:'fun', name:'🏁 Спорт & Фан', color:'amber', alloc:20, bal:0, target:50000}
    ],
    tx: [
        {id:'pre1', type:'income', amount:120000, date:today(), cat:'Зарплата', isDist:true},
        {id:'pre2', type:'transfer', from:null, to:'main', amount:60000, date:today(), note:'💸 Зарплата', parentId:'pre1'},
        {id:'pre3', type:'transfer', from:null, to:'invest', amount:36000, date:today(), note:'💸 Зарплата', parentId:'pre1'},
        {id:'pre4', type:'transfer', from:null, to:'fun', amount:24000, date:today(), note:'💸 Зарплата', parentId:'pre1'},
        {id:'pre5', type:'expense', amount:1400, date:today(), accId:'main', cat:'Заправка (АИ-100)'},
        {id:'pre6', type:'expense', amount:450, date:today(), accId:'fun', cat:'Кофе и круассан'}
    ],

/**
 * STREAMING_CHUNK: Financial Flow Recalculation Engine
 */
function recalc() {
    // Zero out all active balances
    state.accounts.forEach(a => a.bal = 0);
    
    // Sort transactions chronological play
    const sorted = [...state.tx].sort((a,b) => new Date(a.date) - new Date(b.date));
    
    sorted.forEach(t => {
        if (t.type === 'expense') {
            const acc = state.accounts.find(a => a.id === t.accId);
            if (acc) acc.bal -= t.amount;
        } else if (t.type === 'income') {
            // If parent income distribution flag is true, we ignore it to avoid double-accounting
            if (t.isDist) return;
            // Otherwise, simple direct deposit
            const acc = state.accounts.find(a => a.id === t.accId);
            if (acc) acc.bal += t.amount;
        } else if (t.type === 'transfer') {
            const from = state.accounts.find(a => a.id === t.from);
            const to = state.accounts.find(a => a.id === t.to);
            if (from) from.bal -= t.amount;
            if (to) to.bal += t.amount;
        }
    });
}

// Distribute income method (split via wallets allocations automatically)
function distributeIncome(amount, date, source) {
    const parentId = uid();
    // Parent transaction entry inside log
    state.tx.push({ id:parentId, type:'income', amount, date, cat:source, isDist:true });
    
    // Distribute via configurations
    let rest = amount;
    const totalAlloc = state.accounts.reduce((sum, a) => sum + (a.alloc||0), 0) || 100;
    
    state.accounts.forEach(acc => {
        const part = Math.round(amount * (acc.alloc||0) / totalAlloc);
        if (part > 0) {
            state.tx.push({
                id: uid(), type: 'transfer', from: null, to: acc.id, 
                amount: part, date, note: '⚡ ' + source, parentId 
            });
            rest -= part;
        }
    });
    
    // Throw residue into first active account
    if (rest !== 0 && state.accounts.length) {
        state.tx.push({
            id: uid(), type: 'transfer', from: null, to: state.accounts[0].id, 
            amount: rest, date, note: 'Копейки', parentId
        });
    }
}

    refresh() {
        $('app-view').innerHTML = Views[this.current]();
        if (this.current === 'home') this.drawHUDChart();

    // Elegant HUD Chart Implementation using Chart.js
    drawHUDChart() {
        const canvas = $('mainChart');
        if (!canvas) return;
        
        // Setup past 15 days dynamics
        const labels = [];
        const datasets = {};
        const daysToShow = 15;
        
        for (let i = daysToShow - 1; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            labels.push(key);
            datasets[key] = 0;
        }
        
        state.tx.forEach(t => {
            if (t.type === 'expense' && datasets[t.date] !== undefined) {
                datasets[t.date] += t.amount;
            }
        });

        const activeColors = {
            comfort: { line: '#00f0ff', gradientStart: 'rgba(0, 240, 255, 0.25)', gradientStop: 'rgba(0, 240, 255, 0)' },
            sport: { line: '#ff3b30', gradientStart: 'rgba(255, 59, 48, 0.3)', gradientStop: 'rgba(255, 59, 48, 0)' },
            ecopro: { line: '#34c759', gradientStart: 'rgba(52, 199, 89, 0.25)', gradientStop: 'rgba(52, 199, 89, 0)' }
        };
        
        const currentColors = activeColors[state.activeMode] || activeColors.comfort;

        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 100);
        gradient.addColorStop(0, currentColors.gradientStart);
        gradient.addColorStop(1, currentColors.gradientStop);

        // Reset previous chart if any exists on the canvas context element
        if (window.myCockpitChart) {
            window.myCockpitChart.destroy();
        }

        window.myCockpitChart = new Chart(canvas, {
            type: 'line',
            data: {

/**
 * STREAMING_CHUNK: Transaction Modal Interaction Controller
 */
const TxModal = {
    type: 'expense',
    open() {
        SoundEngine.playClick();
        $('tx-modal').classList.remove('opacity-0', 'pointer-events-none');
        $('tx-modal-content').classList.remove('translate-y-20');
        $('m-date').value = today();
        $('m-sum').value = '';
        $('m-sum').focus();
        
        // Load active selector accounts options
        const opts = state.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        $('m-acc').innerHTML = opts;
        $('m-to').innerHTML = opts;
        
        this.setType('expense');
    },
    close() {
        SoundEngine.playClick();
        $('tx-modal').classList.add('opacity-0', 'pointer-events-none');
        $('tx-modal-content').classList.add('translate-y-20');
    },
    setType(t) {
        this.type = t;
        const activeClass = "flex-1 py-2 rounded-lg text-xs font-semibold font-tech transition-all uppercase text-white shadow-md";
        const inactiveClass = "flex-1 py-2 rounded-lg text-xs font-semibold font-tech transition-all uppercase text-slate-400 hover:text-white";
        
        ['expense', 'income', 'transfer'].forEach(type => {
            const btn = $(`tx-type-${type}`);
            if (type === t) {
                let cl = activeClass;
                if(t === 'expense') cl += " bg-rose-600 shadow-rose-600/10";
                else if(t === 'income') cl += " bg-emerald-600 shadow-emerald-600/10";
                else cl += " bg-cyan-600 shadow-cyan-600/10";
                btn.className = cl;
            } else {
                btn.className = inactiveClass;
            }
        });
        
        // Fields visibility toggler based on type selection
        if (t === 'income') {
            $('field-acc').classList.add('hidden');
            $('field-to').classList.add('hidden');
            $('m-cat').placeholder = "Пополнение баланса / Зарплата / Фриланс";
        } else if (t === 'expense') {
            $('field-acc').classList.remove('hidden');
            $('field-to').classList.add('hidden');
            $('m-cat').placeholder = "Категория расходов (Такси, Пицца...)";
        } else {
            $('field-acc').classList.remove('hidden');
            $('field-to').classList.remove('hidden');
            $('m-cat').placeholder = "Заметка к переводу";
        }
    },
    submit() {
        const sum = Math.round(Number($('m-sum').value));
        if (!sum) {
            SoundEngine.playBeep(false);
            return;
        }
        const date = $('m-date').value || today();
        const note = $('m-cat').value;

        if (this.type === 'income') {
            distributeIncome(sum, date, note || 'Доход');
        } else if (this.type === 'expense') {
            state.tx.push({ id:uid(), type:'expense', amount:sum, date, accId:$('m-acc').value, cat:note });
        } else {
            const from = $('m-acc').value;
            const to = $('m-to').value;
            if (from === to) {
                SoundEngine.playBeep(false);
                return;
            }
            state.tx.push({ id:uid(), type:'transfer', amount:sum, date, from, to, note:note });
        }
        
        SoundEngine.playBeep(true);
        save();
        this.close();
    }
};

/**
 * STREAMING_CHUNK: Wallet Edit/Setup Modal Controller
 */
const AccModal = {
    selectedColor: 'blue',
    open(id = null) {
        SoundEngine.playClick();
        $('acc-modal').classList.remove('opacity-0', 'pointer-events-none');
        $('acc-modal-content').classList.remove('translate-y-20');
        
        // Colors palette setup inside modal
        const container = $('acc-m-colors');
        container.innerHTML = Object.keys(COLOR_PALETTE).map(col => `
            <button onclick="AccModal.setColor('${col}')" type="button" class="w-8 h-8 rounded-full border-2 transition-all relative flex items-center justify-center" style="background-color: ${COLOR_PALETTE[col]}; border-color: ${col === this.selectedColor ? 'white' : 'transparent'}">
                <span id="col-check-${col}" class="text-[9px] text-white ${col === this.selectedColor ? '' : 'hidden'}">✓</span>
            </button>
        `).join('');

        if (id) {
            // Edit existing wallet
            const acc = state.accounts.find(a => a.id === id);
            $('acc-m-id').value = id;
            $('acc-m-name').value = acc.name;
            $('acc-m-alloc').value = acc.alloc || 0;
            $('acc-m-alloc-val').innerText = (acc.alloc || 0) + '%';
            $('acc-m-target').value = acc.target || '';
            $('acc-modal-title').innerText = "Изменить Сеть";
            $('acc-m-delete-btn').classList.remove('hidden');
            this.setColor(acc.color || 'blue');
        } else {
            // Setup new wallet
            $('acc-m-id').value = '';
            $('acc-m-name').value = '';
            $('acc-m-alloc').value = '0';
            $('acc-m-alloc-val').innerText = '0%';
            $('acc-m-target').value = '';
            $('acc-modal-title').innerText = "Новый Кошелек";
            $('acc-m-delete-btn').classList.add('hidden');
            this.setColor('blue');
        }
    },
    close() {
        SoundEngine.playClick();
        $('acc-modal').classList.add('opacity-0', 'pointer-events-none');
        $('acc-modal-content').classList.add('translate-y-20');
    },
    setColor(col) {
        // Toggle selected styling
        const prev = $(`col-check-${this.selectedColor}`);
        if(prev) prev.classList.add('hidden');
        
        this.selectedColor = col;
        const activeNode = $(`col-check-${col}`);
        if(activeNode) activeNode.classList.remove('hidden');

        // Repaint border circles highlight colors
        const btns = $('acc-m-colors').querySelectorAll('button');
        let index = 0;
        Object.keys(COLOR_PALETTE).forEach(c => {
            btns[index].style.borderColor = c === col ? 'white' : 'transparent';
            index++;
        });
    },
    submit() {
        const id = $('acc-m-id').value;
        const name = $('acc-m-name').value || 'Новый Счёт';
        const alloc = Number($('acc-m-alloc').value) || 0;
        const target = Number($('acc-m-target').value) || 0;
        const color = this.selectedColor;

        if (id) {
            // Edit
            const acc = state.accounts.find(a => a.id === id);
            if (acc) {
                acc.name = name;
                acc.alloc = alloc;
                acc.target = target;
                acc.color = color;
            }
        } else {
            // Setup New
            state.accounts.push({
                id: uid(),
                name,
                alloc,
                target,
                color,
                bal: 0
            });
        }
        
        SoundEngine.playBeep(true);
        save();
        this.close();
    },
    delete() {
        const id = $('acc-m-id').value;
        if (!id) return;
        
        // Safe delete confirmation warning dialog customized
        const hasBalance = state.accounts.find(a => a.id === id)?.bal !== 0;
        const confirmMessage = hasBalance 
            ? '⚠️ Внимание! Баланс не равен нулю. Вы уверены, что хотите ликвидировать этот кошелек?' 
            : 'Удалить этот кошелек из системы?';

        if (confirm(confirmMessage)) {
            // Purge from active accounts
            state.accounts = state.accounts.filter(a => a.id !== id);
            // Re-assign transactions references to avoid null targets or purge
            state.tx = state.tx.filter(t => t.accId !== id && t.from !== id && t.to !== id);
            
            SoundEngine.playBeep(true);
            save();
            this.close();
        }
    }
};

/**
 * STREAMING_CHUNK: Advanced Core Global Actions
 */
const AppActions = {
    // Delete transaction from ledger log
    deleteTransaction(id) {
        if (!confirm('Вы хотите удалить эту запись из бортового журнала?')) return;
        
        const tx = state.tx.find(t => t.id === id);
        if (tx) {
            if (tx.isDist) {
                // Delete child distribution transfers associated with parent ID
                state.tx = state.tx.filter(t => t.parentId !== id && t.id !== id);
            } else {
                state.tx = state.tx.filter(t => t.id !== id);
            }
            SoundEngine.playBeep(true);
            save();
        }
    },

    // Confirm auto pay for subscription trigger
    confirmSubscription(id) {
        const sub = state.subs.find(s => s.id === id);
        if (sub) {
            // Record expense
            state.tx.push({
                id: uid(),
                type: 'expense',
                amount: sub.amount,
                date: today(),
                accId: sub.accId,
                cat: `🔄 ${sub.name}`
            });
            
            // Increment next date calculation logic
            const d = new Date(sub.next);
            d.setMonth(d.getMonth() + 1);
            sub.next = d.toISOString().slice(0, 10);
            
            SoundEngine.playBeep(true);
            save();
        }
    },

    // Add subscription interface wrapper popup prompts
    addSubscription() {
        SoundEngine.playClick();
        const name = prompt('Название автосписания (например, Яндекс Плюс):');
        if (!name) return;
        const amount = Number(prompt('Сумма (₽):'));
        if (!amount) return;
        
        // Pick account select reference
        let opts = state.accounts.map((a, idx) => `${idx + 1}. ${a.name}`).join('\n');
        const accIdx = Number(prompt(`Выберите номер счета для оплаты:\n${opts}`)) - 1;
        
        const acc = state.accounts[accIdx];
        if (!acc) {
            SoundEngine.playBeep(false);
            return;
        }

        state.subs.push({
            id: uid(),
            type: 'expense',
            name,
            amount,
            freq: 'месяц',
            next: today(),
            accId: acc.id
        });

        SoundEngine.playBeep(true);
        save();
    },

    // Backup Export Data
    exportBackup() {
        SoundEngine.playClick();
        const backupString = JSON.stringify(state, null, 2);
        const blob = new Blob([backupString], { type: 'application/json' });
        
        // Modernized safe download execution anchor
        const anchor = document.createElement('a');
        anchor.href = URL.createObjectURL(blob);
        anchor.download = `i8_finflow_backup_${today()}.json`;
        anchor.click();
        
        SoundEngine.playBeep(true);
    },

    // Backup Import Data
    importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const parsed = JSON.parse(e.target.result);
                // Schema health check validation
                if (parsed.accounts && parsed.tx) {
                    state = parsed;
                    SoundEngine.playBeep(true);
                    save();
                    alert('🚀 Телеметрия успешно загружена!');
                } else {
                    throw new Error('Устаревший или неподходящий формат JSON схемы.');
                }
            } catch (err) {
                SoundEngine.playBeep(false);
                alert('🚨 Ошибка чтения файла бэкапа: ' + err.message);
            }
        };
        reader.readAsText(file);
    }
};

/**
 * STREAMING_CHUNK: App Launching Initialization on Window Load
 */
window.onload = function () {
    // Sync current UI active drive mode class
    document.body.classList.remove('theme-comfort', 'theme-sport', 'theme-ecopro');
    document.body.classList.add(`theme-${state.activeMode || 'comfort'}`);
    
    // Auto-select mode active highlight
    const initialMode = state.activeMode || 'comfort';
    DriveMode.switch(initialMode);
    
    // Run ledger balance engine
    recalc();
    
    // Init router engine
    Router.refresh();
};
